services:
  # PostGIS database for vector tile data (street lighting)
  db:
    image: postgis/postgis:16-3.5-alpine
    container_name: scenic-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  pgadmin:
    image: dpage/pgadmin4:9.12.0
    container_name: scenic-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - db

  # Martin vector tile server (serves MVT from PostGIS)
  tileserver:
    image: ghcr.io/maplibre/martin:1.3.1
    container_name: scenic-tileserver
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db/${POSTGRES_DB}
    volumes:
      - ./docker/martin/config.yaml:/config.yaml:ro
    command: ["--config", "/config.yaml"]
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  # osm2pgsql seeder – imports street lighting data into PostGIS
  seeder:
    build:
      context: .
      dockerfile: docker/seeder/Dockerfile
    container_name: scenic-seeder
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./app/data:/data
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - seed # Run manually via: docker compose --profile seed up seeder

  # Redis message broker and result backend
  redis:
    image: redis:7-alpine
    container_name: scenic-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Flask API server
  api:
    build: .
    container_name: scenic-api
    ports:
      - "5001:5000"
    volumes:
      # Shared cache volume for processed graphs
      - ./app/data:/app/app/data
      # Mount code for development (optional - remove in production)
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
      - FLASK_ENV=development
      - FLASK_HOST=0.0.0.0
      - ASYNC_MODE=true
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - GREENNESS_MODE=EDGE_SAMPLING
      - ELEVATION_MODE=LOCAL
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB_HOST=db
      - POSTGRES_DB_PORT=5432
      - USER_DB_NAME=${USER_DB_NAME:-user_db}
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    command: python run.py

  # Celery worker for graph building
  worker:
    build: .
    container_name: scenic-worker
    volumes:
      # Shared cache volume - MUST match api container
      - ./app/data:/app/app/data
      # Mount code for development (optional)
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - GREENNESS_MODE=EDGE_SAMPLING
      - ELEVATION_MODE=LOCAL
      - C_FORCE_ROOT=true
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB_HOST=db
      - POSTGRES_DB_PORT=5432
      - USER_DB_NAME=${USER_DB_NAME:-user_db}
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    command: celery -A celery_app worker --loglevel=info --concurrency=4

  # Optional: Flower monitoring UI
  flower:
    build: .
    container_name: scenic-flower
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A celery_app flower --port=5555
    profiles:
      - monitoring # Only starts with `docker-compose --profile monitoring up`

volumes:
  redis_data:
  postgres_data:
